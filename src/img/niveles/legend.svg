<svg width="600" height="100" xmlns="http://www.w3.org/2000/svg">
    <!-- Bajo -->
    <rect x="0" y="20" width="50" height="50" fill="green" />
    <text x="10" y="15" font-size="12" fill="black">BAJO</text>
    <text x="20" y="50" font-size="20" fill="white">1</text>

    <rect x="50" y="20" width="50" height="50" fill="green" />
    <text x="70" y="50" font-size="20" fill="white">2</text>

    <!-- Moderado -->
    <rect x="100" y="20" width="50" height="50" fill="yellow" />
    <text x="105" y="15" font-size="12" fill="black">MODERADO</text>
    <text x="120" y="50" font-size="20" fill="black">3</text>

    <rect x="150" y="20" width="50" height="50" fill="yellow" />
    <text x="170" y="50" font-size="20" fill="black">4</text>

    <rect x="200" y="20" width="50" height="50" fill="yellow" />
    <text x="220" y="50" font-size="20" fill="black">5</text>

    <!-- Alto -->
    <rect x="250" y="20" width="50" height="50" fill="orange" />
    <text x="260" y="15" font-size="12" fill="black">ALTO</text>
    <text x="270" y="50" font-size="20" fill="black">6</text>

    <rect x="300" y="20" width="50" height="50" fill="orange" />
    <text x="320" y="50" font-size="20" fill="black">7</text>

    <!-- Muy Alto -->
    <rect x="350" y="20" width="50" height="50" fill="red" />
    <text x="355" y="15" font-size="12" fill="black">MUY ALTO</text>
    <text x="370" y="50" font-size="20" fill="white">8</text>

    <rect x="400" y="20" width="50" height="50" fill="red" />
    <text x="420" y="50" font-size="20" fill="white">9</text>

    <rect x="450" y="20" width="50" height="50" fill="red" />
    <text x="470" y="50" font-size="20" fill="white">10</text>

    <!-- Extremo -->
    <rect x="500" y="20" width="50" height="50" fill="purple" />
    <text x="505" y="15" font-size="12" fill="black">EXTREMO</text>
    <text x="520" y="50" font-size="20" fill="white">11+</text>
</svg>
